<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spor Salonu</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('https://via.placeholder.com/1600x900') no-repeat center center/cover;
      color: white;
    }

    .overlay {
      background-color: rgba(0, 0, 0, 0.7);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 20px;
      max-width: 600px;
    }

    .buttons {
      display: flex;
      gap: 10px;
    }

    .button {
      background-color: #4e00e0;
      color: white;
      padding: 15px 30px;
      font-size: 1rem;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 8px #4e00e0;
      transition: transform 0.2s, background-color 0.3s;
    }

    .button:hover {
      background-color: #4e00e0;
      transform: scale(1.05);
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2.5rem;
      }

      p {
        font-size: 1rem;
      }

      .button {
        padding: 12px 20px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="container">
      <h1>Hayalinizdeki arabaya kavuşmak için</h1>
      <p>Hayalinizdeki arabaya kavuşmak için, Hayalinizdeki arabadan haberdar olmak için ya da düşüncelerinizi bizimle paylaşmak için kayıt olun</p>
      <div class="buttons">
        <a href="kayitOl.html" class="button">Üye Ol</a>
        <a href="giris.html" class="button">Giriş Yapın</a>
      </div>
    </div>
  </div>
</body>
</html>
